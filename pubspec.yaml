name: purchase_session_manager
description: Purchase Session Manager Flutter app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  archive: ^3.6.1
  intl: ^0.19.0
  image_picker: ^1.1.2
  pdf: ^3.11.0
  printing: ^5.12.0
  uuid: ^4.4.0
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
